version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 18
        - nvm use 18
        - npm install --legacy-peer-deps
    build:
      commands:
        - echo "SANITY_STUDIO_PROJECT_ID=ksvzkor4" > sanity_studio/.env
        - echo "SANITY_STUDIO_DATASET=dev" >> sanity_studio/.env
        - npm run build
  artifacts:
    baseDirectory: public
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
