<!doctype html>
<html lang="hu">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="index.css" rel="stylesheet">
  <link rel="icon" href="assets/Logo.svg" type="image/svg+xml">
  <title>Wine&Sofi - Coming Soon</title>
  <!-- SEO meta tags -->
  <meta name="description"
    content="Wine&Sofi - Fedezze fel finom borválasztékunkat. Látogassa meg pincészetünket a közösségi médiában, vagy lépjen kapcsolatba velünk e-mailben.">
  <meta name="keywords" content="Wine, Sofi, Wine&Sofi, Fine Wines, Wine Selection, Kéknyelű, Olaszrizling">
  <meta property="og:title" content="Wine&Sofi - Coming Soon">
  <meta property="og:description"
    content="Wine&Sofi - Fedezze fel finom borválasztékunkat. Látogassa meg pincészetünket a közösségi médiában, vagy lépjen kapcsolatba velünk e-mailben.">
  <meta property="og:image" content="assets/Logo.svg">
  <meta property="og:url" content="#">
</head>

<body>
  <nav class="relative flex items-center justify-between w-full h-14 mt-4 mx-auto md:w-9/12">
    <!-- logo -->
    <img class="absolute block h-14 top-2 left-2 md:hidden" src="assets/Logo.svg" alt="Logo">
    <!-- social -->
    <div class="absolute flex items-center justify-end right-0">
      <a href="https://www.facebook.com"><img class="w-6 h-6 mx-2" src="assets/facebook.png" alt="Facebook"></a>
      <a href="https://www.instagram.com"><img class="w-6 h-6 mx-2" src="assets/instagram.png" alt="Instagram"></a>
    </div>
  </nav>
  <!-- hero -->
  <div class="container relative flex flex-col justify-center w-full mx-auto mt-4 hero md:w-9/12">
    <!-- logo overlap -->
    <div class="absolute flex justify-center top-0 left-0 right-0 mx-auto">
      <img class="absolute hidden w-auto h-20 logo md:block lg:block" src="assets/Logo.svg" alt="Logo">
      <img class="hidden z-1 md:block lg:block" src="assets/Intersect.png" alt="">
    </div>
    <!-- wine container -->
    <div class="flex justify-end container md:mt-28">
      <div class="relative grid gap-2 md:gap-0 md:mr-20 md:ml-16 md:-mb-12 grid-cols-3 wine-container">
        <!-- wine 3 -->
        <div class="relative wine">
          <img class="relative h-auto -mb-16 z-30" src="assets/bor3.png" alt="kéknyelű 2021">
          <div
            class="flex flex-col justify-center items-center gap-1 md:absolute bg-blue rounded-full opacity-90 text-xs z-20 circle first">
            <span>Wine&Sofi</span>
            <div class="line"></div>
            <span>kéknyelű</span>
            <span class="text-sm">202<span class="text-xs">1</span></span>
          </div>
        </div>
        <!-- wine 2 -->
        <div class="relative wine">
          <img class="relative h-auto -mb-16 z-20" id="right" src="assets/bor1.png" alt="olaszrizling 2022">
          <div
            class="flex flex-col justify-center items-center gap-1 md:absolute bg-brown rounded-full opacity-90 text-xs z-30 circle second">
            <span>Wine&Sofi</span>
            <div class="line"></div>
            <span>olaszrizling</span>
            <span class="text-sm">202<span class="text-xs">2</span></span>
          </div>
        </div>
        <!-- wine 3 -->
        <div class="relative wine">
          <img class="relative h-auto -mb-16 z-30" src="assets/bor2.png" alt="olaszrizling 2022">
          <div
            class="flex flex-col justify-center items-center gap-1 md:absolute bg-green rounded-full opacity-90 text-xs z-20 circle third">
            <span>Wine&Sofi</span>
            <div class="line"></div>
            <span>olaszrizling</span>
            <span class="text-sm">202<span class="text-xs">2</span></span>
          </div>
        </div>
      </div>
    </div>
  </div>
  <!-- text + button -->
  <div class="flex flex-col items-center justify-center p-0 pt-32 text-center md:pt-20 text-container">
    <p class="mb-4 text-lg xl:text-base">
      Itt hamarosan a Wine&Sofi weboldalát találod.<br>
      Mindaddig látogasd meg pincészetünket a közösségi oldalainkon vagy vedd fel velünk a kapcsolatot emailben!
    </p>
    <a href="mailto:example@example.com"
      class="my-4 py-3 px-5 text-xs text-white font-sans font-semibold tracking-[2px] uppercase bg-button_black rounded-2xl">
      kapcsolatfelvétel
    </a>
  </div>
</body>

</html>
