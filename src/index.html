<!doctype html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.16/dist/tailwind.min.css" rel="stylesheet">
  <link href="./index.css" rel="stylesheet">
  <title>Wine&Sofi</title>
</head>

<body>
  <nav class="flex items-center justify-between p-6">
    <div class="flex items-center justify-center flex-grow">
      <img src="assets/Logo.svg" alt="Logo" class="h-8 w-auto">
    </div>
    <div class="flex items-center justify-end">
      <a href="https://www.facebook.com"><img src="#" alt="Facebook" class="h-6 w-auto mx-2 "></a>
      <a href="https://www.instagram.com"><img src="#" alt="Instagram" class="h-6 w-auto mx-2"></a>
    </div>
  </nav>
  <div class="relative">
    <img src="#" alt="Background" class="w-full">
    <img src="#" alt="Overlay" class="absolute top-0 left-0">
  </div>
  <div class="grid grid-cols-3 justify-center relative wine-container">
    <div class="relative wine">
      <img class="absolute object-cover h-full z-30" src="assets/bor3.png" alt="kéknyelű 2021">
      <div class="flex flex-col justify-center items-center gap-1 z-20 absolute circle first">
        <span>Wine&Sofi</span>
        <div class="line"></div>
        <span>kéknyelű</span>
        <span class="big">202<span class="small">1</span></span>
      </div>
    </div>
    <div class="relative wine">
      <img class="absolute object-cover h-full z-20" src="assets/bor1.png" alt="olaszrizling 2022">
      <div class="flex flex-col justify-center items-center gap-1 z-30 absolute circle second">
        <span>Wine&Sofi</span>
        <div class="line"></div>
        <span>olaszrizling</span>
        <span class="big">202<span class="small">2</span></span>
      </div>
    </div>
    <div class="relative wine">
      <img class="absolute object-cover h-full z-30" src="assets/bor2.png" alt="olaszrizling 2022">
      <div class="flex flex-col justify-center items-center gap-1 z-20 absolute circle third">
        <span>Wine&Sofi</span>
        <div class="line"></div>
        <span>olaszrizling</span>
        <span class="big">202<span class="small">2</span></span>
      </div>
    </div>
  </div>
  <div class="flex flex-col items-center justify-center text-center p-6">
    <p class="mb-4">Itt hamarosan a Wine&Sofi weboldalát találod.
      Mindaddig látogasd meg pincészetünket a közösségi oldalainkon vagy vedd fel velünk a kapcsolatot emailben!</p>
    <button class="bg-black text-white text-xs font-sans font-semibold uppercase tracking-[2px] rounded-2xl py-3 px-5;
    ">kapcsolatfelvétel</button>
  </div>
</body>

</html>
